<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>writings / azad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee;
    --ink: #111110;
    --muted: #7a7870;
    --accent: #2a2a28;
    --line: #dddbd4;
    --hover-bg: #eceae3;
    --admin-accent: #c8451a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 17px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    padding: 28px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 0.5px solid var(--line);
  }
  .nav-left {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }
  .nav-right {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    display: flex;
    gap: 28px;
  }
  .nav-right a {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s;
  }
  .nav-right a:hover { color: var(--ink); }
  .nav-right a.active { color: var(--ink); }

  /* ── HEADER ── */
  .page-header {
    padding: 56px 48px 0;
  }
  .page-header h1 {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0;
  }

  /* ── WRITINGS LIST ── */
  .writings-container {
    padding: 20px 48px 80px;
    max-width: 860px;
  }

  .writings-list {
    list-style: none;
  }

  .writing-item {
    display: grid;
    grid-template-columns: 72px 1fr auto;
    align-items: baseline;
    gap: 0 20px;
    padding: 13px 0;
    border-bottom: 0.5px solid var(--line);
    cursor: pointer;
    transition: background 0.1s;
    border-radius: 3px;
    margin: 0 -8px;
    padding-left: 8px;
    padding-right: 8px;
  }

  .writing-item:hover {
    background: var(--hover-bg);
  }

  .writing-date {
    font-family: 'DM Mono', monospace;
    font-size: 11.5px;
    color: var(--muted);
    letter-spacing: 0.04em;
    white-space: nowrap;
    padding-top: 2px;
  }

  .writing-content {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .writing-title {
    font-size: 16.5px;
    font-weight: 500;
    color: var(--ink);
    text-decoration: none;
    line-height: 1.35;
  }

  .writing-subtitle {
    font-size: 14.5px;
    color: var(--muted);
    font-style: italic;
    line-height: 1.35;
  }

  .writing-arrow {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--line);
    transition: color 0.15s, transform 0.15s;
  }

  .writing-item:hover .writing-arrow {
    color: var(--muted);
    transform: translateX(3px);
  }

  /* ── MONTH FILTER ── */
  .month-bar {
    padding: 20px 48px 0;
    font-family: 'DM Mono', monospace;
    font-size: 11.5px;
    color: var(--muted);
    letter-spacing: 0.06em;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .month-btn {
    cursor: pointer;
    padding: 2px 0;
    border: none;
    background: none;
    font-family: inherit;
    font-size: inherit;
    color: inherit;
    letter-spacing: inherit;
    transition: color 0.15s;
    border-bottom: 1px solid transparent;
  }
  .month-btn:hover { color: var(--ink); }
  .month-btn.active {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }

  /* ── FOOTER ── */
  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 14px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg);
    border-top: 0.5px solid var(--line);
  }
  .footer-copy {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }
  .admin-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--line);
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.15s;
    letter-spacing: 0.03em;
  }
  .admin-btn:hover { color: var(--muted); }

  /* ── ADMIN PANEL ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(17,17,16,0.55);
    z-index: 100;
    backdrop-filter: blur(2px);
  }
  .overlay.open { display: flex; align-items: center; justify-content: center; }

  .modal {
    background: var(--bg);
    border: 0.5px solid var(--line);
    border-radius: 6px;
    padding: 36px 40px;
    width: 520px;
    max-width: 90vw;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-title {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }

  .form-group {
    margin-bottom: 18px;
  }
  .form-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: block;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .form-input {
    width: 100%;
    background: var(--bg);
    border: 0.5px solid var(--line);
    border-radius: 4px;
    padding: 9px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--muted); }
  select.form-input { cursor: pointer; }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    justify-content: flex-end;
  }
  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 9px 20px;
    border-radius: 4px;
    border: 0.5px solid var(--line);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .btn-cancel {
    background: transparent;
    color: var(--muted);
  }
  .btn-cancel:hover { background: var(--hover-bg); }
  .btn-primary {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-danger {
    background: transparent;
    color: var(--admin-accent);
    border-color: var(--admin-accent);
  }
  .btn-danger:hover { background: #fdf0eb; }

  /* password screen */
  .pw-error {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--admin-accent);
    margin-top: 6px;
    display: none;
  }
  .pw-error.show { display: block; }

  /* editing indicator */
  .edit-bar {
    display: none;
    background: var(--ink);
    color: var(--bg);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 48px;
    letter-spacing: 0.04em;
    justify-content: space-between;
    align-items: center;
  }
  .edit-bar.show { display: flex; }
  .edit-bar button {
    background: none;
    border: 0.5px solid rgba(255,255,255,0.3);
    color: var(--bg);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 3px 12px;
    border-radius: 3px;
    cursor: pointer;
    margin-left: 8px;
  }
  .edit-bar button:hover { background: rgba(255,255,255,0.1); }

  /* delete icon on each row (admin mode) */
  .item-actions {
    display: none;
    gap: 8px;
    align-items: center;
  }
  .admin-active .item-actions { display: flex; }
  .admin-active .writing-arrow { display: none; }
  .action-icon {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 3px;
    border: 0.5px solid var(--line);
    background: var(--bg);
    transition: all 0.12s;
    white-space: nowrap;
  }
  .action-icon:hover { background: var(--hover-bg); color: var(--ink); }
  .action-icon.del:hover { background: #fdf0eb; color: var(--admin-accent); border-color: var(--admin-accent); }

  @media (max-width: 600px) {
    nav, .page-header, .writings-container, .month-bar, footer { padding-left: 20px; padding-right: 20px; }
    .writing-item { grid-template-columns: 60px 1fr; }
    .writing-arrow, .item-actions { display: none !important; }
    .modal { padding: 24px 20px; }
  }
</style>
</head>
<body>

<!-- EDIT MODE BAR -->
<div class="edit-bar" id="editBar">
  <span>✦ admin mode — azad singh</span>
  <div>
    <button onclick="openAddModal()">+ add writing</button>
    <button onclick="lockAdmin()">lock</button>
  </div>
</div>

<!-- NAV -->
<nav>
  <div class="nav-left">writings / azad</div>
  <div class="nav-right">
    <a href="#">home</a>
    <a href="#" class="active">writings</a>
  </div>
</nav>

<!-- HEADER -->
<div class="page-header">
  <h1>Writings</h1>
</div>

<!-- MONTH FILTER -->
<div class="month-bar" id="monthBar">
  <button class="month-btn active" data-month="all" onclick="filterMonth(this, 'all')">ALL</button>
  <button class="month-btn" data-month="JAN" onclick="filterMonth(this, 'JAN')">JAN</button>
  <button class="month-btn" data-month="FEB" onclick="filterMonth(this, 'FEB')">FEB</button>
  <button class="month-btn" data-month="MAR" onclick="filterMonth(this, 'MAR')">MAR</button>
  <button class="month-btn" data-month="APR" onclick="filterMonth(this, 'APR')">APR</button>
  <button class="month-btn" data-month="MAY" onclick="filterMonth(this, 'MAY')">MAY</button>
  <button class="month-btn" data-month="JUN" onclick="filterMonth(this, 'JUN')">JUN</button>
  <button class="month-btn" data-month="JUL" onclick="filterMonth(this, 'JUL')">JUL</button>
  <button class="month-btn" data-month="AUG" onclick="filterMonth(this, 'AUG')">AUG</button>
  <button class="month-btn" data-month="SEP" onclick="filterMonth(this, 'SEP')">SEP</button>
  <button class="month-btn" data-month="OCT" onclick="filterMonth(this, 'OCT')">OCT</button>
  <button class="month-btn" data-month="NOV" onclick="filterMonth(this, 'NOV')">NOV</button>
  <button class="month-btn" data-month="DEC" onclick="filterMonth(this, 'DEC')">DEC</button>
</div>

<!-- WRITINGS LIST -->
<div class="writings-container">
  <ul class="writings-list" id="writingsList"></ul>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-copy">© AZAD SINGH 2026</div>
  <button class="admin-btn" onclick="openPasswordModal()" title="Admin">⬡</button>
</footer>

<!-- ══════════════════ OVERLAYS ══════════════════ -->

<!-- Password Modal -->
<div class="overlay" id="pwOverlay">
  <div class="modal">
    <div class="modal-title">Admin Access</div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="pwInput" placeholder="enter password" onkeydown="if(event.key==='Enter')checkPassword()">
      <div class="pw-error" id="pwError">incorrect password</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeAll()">cancel</button>
      <button class="btn btn-primary" onclick="checkPassword()">unlock</button>
    </div>
  </div>
</div>

<!-- Add / Edit Writing Modal -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add Writing</div>

    <div class="form-group">
      <label class="form-label">Month</label>
      <select class="form-input" id="fMonth">
        <option>JAN</option><option>FEB</option><option>MAR</option>
        <option>APR</option><option>MAY</option><option>JUN</option>
        <option>JUL</option><option>AUG</option><option>SEP</option>
        <option>OCT</option><option>NOV</option><option>DEC</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Year (last 2 digits)</label>
      <input type="text" class="form-input" id="fYear" placeholder="e.g. 26" maxlength="2">
    </div>
    <div class="form-group">
      <label class="form-label">Title</label>
      <input type="text" class="form-input" id="fTitle" placeholder="e.g. Time Technoplast">
    </div>
    <div class="form-group">
      <label class="form-label">Subtitle (optional)</label>
      <input type="text" class="form-input" id="fSubtitle" placeholder="e.g. From Drums to Composite Cylinders">
    </div>
    <div class="form-group">
      <label class="form-label">Link URL</label>
      <input type="text" class="form-input" id="fLink" placeholder="https://...">
    </div>

    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeAll()">cancel</button>
      <button class="btn btn-danger" id="deleteBtn" onclick="deleteEditing()" style="display:none">delete</button>
      <button class="btn btn-primary" onclick="saveWriting()">save</button>
    </div>
  </div>
</div>

<!-- ══════════════════ SCRIPT ══════════════════ -->
<script>
  /* ── DATA ── */
  // CHANGE THIS PASSWORD to whatever you want
  const ADMIN_PASSWORD = 'azad2026';

  const DEFAULT_WRITINGS = [
    { id: 1, month: 'APR', year: '26', title: 'Time Technoplast', subtitle: "From Plastic Drums to Composite Cylinders", link: '#' },
  ];

  let writings = [];
  let adminUnlocked = false;
  let editingId = null;
  let currentFilter = 'all';

  /* ── STORAGE ── */
  function save() {
    localStorage.setItem('azad_writings', JSON.stringify(writings));
  }
  function load() {
    const stored = localStorage.getItem('azad_writings');
    writings = stored ? JSON.parse(stored) : [...DEFAULT_WRITINGS];
  }

  /* ── RENDER ── */
  function render() {
    const list = document.getElementById('writingsList');
    const filtered = currentFilter === 'all'
      ? writings
      : writings.filter(w => w.month === currentFilter);

    list.innerHTML = '';
    filtered.forEach(w => {
      const li = document.createElement('li');
      li.className = 'writing-item' + (adminUnlocked ? ' admin-active' : '');
      li.dataset.id = w.id;

      li.innerHTML = `
        <span class="writing-date">${w.month}.${w.year}</span>
        <span class="writing-content">
          <a class="writing-title" href="${w.link}" target="_blank" rel="noopener" onclick="${adminUnlocked ? 'return false' : ''}">${w.title}</a>
          ${w.subtitle ? `<span class="writing-subtitle">${w.subtitle}</span>` : ''}
        </span>
        <span class="writing-arrow">→</span>
        <span class="item-actions">
          <button class="action-icon" onclick="openEditModal(${w.id})">edit</button>
          <button class="action-icon del" onclick="quickDelete(${w.id})">del</button>
        </span>
      `;

      if (!adminUnlocked) {
        li.addEventListener('click', (e) => {
          if (!e.target.closest('a')) {
            window.open(w.link, '_blank');
          }
        });
      }

      list.appendChild(li);
    });
  }

  /* ── FILTER ── */
  function filterMonth(btn, month) {
    document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = month;
    render();
  }

  /* ── PASSWORD ── */
  function openPasswordModal() {
    document.getElementById('pwInput').value = '';
    document.getElementById('pwError').classList.remove('show');
    document.getElementById('pwOverlay').classList.add('open');
    setTimeout(() => document.getElementById('pwInput').focus(), 100);
  }

  function checkPassword() {
    const val = document.getElementById('pwInput').value;
    if (val === ADMIN_PASSWORD) {
      adminUnlocked = true;
      closeAll();
      document.getElementById('editBar').classList.add('show');
      render();
    } else {
      document.getElementById('pwError').classList.add('show');
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    }
  }

  function lockAdmin() {
    adminUnlocked = false;
    document.getElementById('editBar').classList.remove('show');
    render();
  }

  /* ── ADD / EDIT ── */
  function openAddModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'Add Writing';
    document.getElementById('deleteBtn').style.display = 'none';
    document.getElementById('fMonth').value = 'APR';
    document.getElementById('fYear').value = '26';
    document.getElementById('fTitle').value = '';
    document.getElementById('fSubtitle').value = '';
    document.getElementById('fLink').value = '';
    document.getElementById('addOverlay').classList.add('open');
    setTimeout(() => document.getElementById('fTitle').focus(), 100);
  }

  function openEditModal(id) {
    const w = writings.find(x => x.id === id);
    if (!w) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'Edit Writing';
    document.getElementById('deleteBtn').style.display = 'inline-block';
    document.getElementById('fMonth').value = w.month;
    document.getElementById('fYear').value = w.year;
    document.getElementById('fTitle').value = w.title;
    document.getElementById('fSubtitle').value = w.subtitle || '';
    document.getElementById('fLink').value = w.link;
    document.getElementById('addOverlay').classList.add('open');
  }

  function saveWriting() {
    const month = document.getElementById('fMonth').value.trim();
    const year  = document.getElementById('fYear').value.trim();
    const title = document.getElementById('fTitle').value.trim();
    const sub   = document.getElementById('fSubtitle').value.trim();
    const link  = document.getElementById('fLink').value.trim();

    if (!title || !link) {
      alert('Title and Link are required.');
      return;
    }

    if (editingId !== null) {
      const idx = writings.findIndex(w => w.id === editingId);
      if (idx > -1) writings[idx] = { id: editingId, month, year, title, subtitle: sub, link };
    } else {
      const newId = writings.length ? Math.max(...writings.map(w => w.id)) + 1 : 1;
      writings.unshift({ id: newId, month, year, title, subtitle: sub, link });
    }

    save();
    closeAll();
    render();
  }

  function deleteEditing() {
    if (editingId === null) return;
    if (!confirm('Delete this writing?')) return;
    writings = writings.filter(w => w.id !== editingId);
    save();
    closeAll();
    render();
  }

  function quickDelete(id) {
    if (!confirm('Delete this writing?')) return;
    writings = writings.filter(w => w.id !== id);
    save();
    render();
  }

  /* ── UTILS ── */
  function closeAll() {
    document.querySelectorAll('.overlay').forEach(o => o.classList.remove('open'));
  }

  document.querySelectorAll('.overlay').forEach(overlay => {
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeAll();
    });
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeAll();
  });

  /* ── INIT ── */
  load();
  render();
</script>
</body>
</html>
